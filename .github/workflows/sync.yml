name: Sync X Bookmarks to Notion

on:
  schedule:
    # cron 은 항상 UTC 기준. UTC 0시 = 한국시간(KST) 오전 9시
    - cron: "0 0 * * *"
  workflow_dispatch: {} # Actions 탭에서 수동 실행 버튼

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: node main.js
        env:
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # refresh_token 자동갱신용 (repo secrets 쓰기 권한 PAT)
          GH_PAT: ${{ secrets.GH_PAT }}
